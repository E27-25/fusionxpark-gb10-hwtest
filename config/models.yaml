# Quantization formats to sweep (on Qwen3-8B as reference)
quant_sweep_model: Qwen/Qwen3-8B
quant_formats:
  - name: bf16
    tool: native
    est_size_gb: 16.0
  - name: fp8
    tool: trtllm_or_vllm
    est_size_gb: 8.0
    priority: highest
  - name: int8
    tool: bitsandbytes
    est_size_gb: 8.0
  - name: awq
    tool: autoawq
    est_size_gb: 4.0
  - name: gptq
    tool: auto_gptq
    est_size_gb: 4.0
  - name: nf4
    tool: bitsandbytes
    est_size_gb: 4.0
  - name: gguf_q4_k_m
    tool: llama_cpp
    est_size_gb: 4.5
  - name: gguf_q5_k_m
    tool: llama_cpp
    est_size_gb: 5.5
  - name: gguf_q8_0
    tool: llama_cpp
    est_size_gb: 8.0

# Speculative decoding pairs
speculative_pairs:
  - draft: Qwen/Qwen3-0.6B
    target: Qwen/Qwen3-8B
    expected_speedup: "2-3x"
  - draft: Qwen/Qwen3-1.7B
    target: Qwen/Qwen3-32B
    expected_speedup: "1.5-2.5x"
  - draft: Qwen/Qwen3-4B
    target: Qwen/Qwen3-32B
    expected_speedup: "1.5-2x"
